name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          sudo apt-get update
          sudo apt-get install -y eapoltest
          # Fail fast if the package did not actually provide the eapol_test
          # binary the integration tests invoke — otherwise those tests would
          # silently t.Skip and we'd lose EAP coverage behind a green run.
          which eapol_test
      - run: go build -v ./...
      - run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_ANALYTICS=1 \
                 HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_INSTALL_CLEANUP=1
          # `brew install --cask` can exit non-zero with "Error: Broken pipe"
          # from its post-install chatter even though the cask installs and links
          # the binary correctly. Don't let that spurious failure fail the job;
          # gate on the binary actually being present instead.
          brew install --cask beryju/tap/crtls || true
          command -v crtls
          make test
      - uses: codecov/codecov-action@v5
        with:
          use_oidc: true
  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          sudo apt-get update
          sudo apt-get install -y eapoltest
          # Fail fast if the package did not actually provide the eapol_test
          # binary the integration tests invoke — otherwise those tests would
          # silently t.Skip and we'd lose EAP coverage behind a green run.
          which eapol_test
      - run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_ANALYTICS=1 \
                 HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_INSTALL_CLEANUP=1
          # See the test job above: tolerate brew's spurious "Broken pipe" exit
          # and gate on the crtls binary being present.
          brew install --cask beryju/tap/crtls || true
          command -v crtls
          make test-race
